name: land_area_app
description: "A new Flutter project for measuring land area using GPS."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.1
  maps_toolkit: ^3.0.0
  permission_handler: ^11.3.0
  csv: ^6.0.0
  path_provider: ^2.1.3
  share_plus: ^10.0.0
  shared_preferences: ^2.2.3
  file_picker: ^8.0.0
  xml: ^6.3.0
  archive: ^3.4.10
  http: ^1.2.0
  open_filex: ^4.7.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  flutter_map_location_marker: ^8.1.0
  intl: ^0.20.2
  geocoding: ^3.0.0
  screenshot: ^2.3.0
  flutter_compass: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
