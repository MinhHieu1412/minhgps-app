name: Build Flutter Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Tải các thư viện
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --base-href "/minhgps-app/"

      - name: Trả về file Web cho người dùng
        uses: actions/upload-artifact@v4
        with:
          name: MINHGPS-Web-Preview
          path: build/web/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
